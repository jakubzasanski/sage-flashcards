<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96" role="img" aria-label="Sage Flashcards dependency bot">
  <defs>
    <linearGradient id="lg" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0" stop-color="#8ec5f0" />
      <stop offset="0.52" stop-color="#3b82f6" />
      <stop offset="1" stop-color="#1e4fb0" />
    </linearGradient>
    <linearGradient id="lgDeep" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a63c8" />
      <stop offset="1" stop-color="#173a85" />
    </linearGradient>
  </defs>

  <!-- antenna stalk + sage leaf (ties the bot back to the brand mark) -->
  <line x1="48" y1="20" x2="48" y2="10" stroke="url(#lgDeep)" stroke-width="3" stroke-linecap="round" />
  <g transform="translate(48,2) rotate(20) scale(0.16)">
    <path d="M34 84C18 60 24 26 70 14 70 44 60 74 34 84Z" fill="url(#lg)" />
  </g>

  <!-- robot head -->
  <rect x="18" y="20" width="60" height="48" rx="14" fill="url(#lg)" />

  <!-- face panel -->
  <rect x="27" y="30" width="42" height="28" rx="9" fill="#16306b" fill-opacity="0.88" />

  <!-- eyes -->
  <circle cx="39" cy="42" r="4.4" fill="#eaf2fd" />
  <circle cx="57" cy="42" r="4.4" fill="#eaf2fd" />

  <!-- friendly smile -->
  <path d="M39 50C43 54 53 54 57 50" fill="none" stroke="#eaf2fd" stroke-width="2.4" stroke-linecap="round" />

  <!-- ears / side bolts -->
  <rect x="12" y="38" width="6" height="14" rx="3" fill="url(#lgDeep)" />
  <rect x="78" y="38" width="6" height="14" rx="3" fill="url(#lgDeep)" />

  <!-- dependency badge: package box with bump arrow -->
  <g transform="translate(48,76)">
    <rect x="-26" y="-8" width="52" height="18" rx="9" fill="url(#lgDeep)" />
    <!-- package cube -->
    <g transform="translate(-15,0)" stroke="#8ec5f0" stroke-width="1.7" stroke-linejoin="round" fill="none">
      <path d="M0 -6 6 -2.5 6 4 0 7.5 -6 4 -6 -2.5Z" />
      <path d="M-6 -2.5 0 1 6 -2.5" />
      <line x1="0" y1="1" x2="0" y2="7.5" />
    </g>
    <!-- version bump arrow -->
    <text x="8" y="5" text-anchor="middle" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="11" font-weight="700" fill="#eaf2fd">&#8593;v</text>
  </g>
</svg>
