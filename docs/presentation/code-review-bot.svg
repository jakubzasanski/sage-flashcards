<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96" role="img" aria-label="Sage Flashcards code review bot">
  <defs>
    <linearGradient id="lg" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0" stop-color="#c4a6ec" />
      <stop offset="0.52" stop-color="#8b5cf6" />
      <stop offset="1" stop-color="#5b32a8" />
    </linearGradient>
    <linearGradient id="lgDeep" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6d44c0" />
      <stop offset="1" stop-color="#43258a" />
    </linearGradient>
  </defs>

  <!-- antenna stalk + sage leaf (ties the bot back to the brand mark) -->
  <line x1="48" y1="20" x2="48" y2="10" stroke="url(#lgDeep)" stroke-width="3" stroke-linecap="round" />
  <g transform="translate(48,2) rotate(20) scale(0.16)">
    <path d="M34 84C18 60 24 26 70 14 70 44 60 74 34 84Z" fill="url(#lg)" />
  </g>

  <!-- robot head -->
  <rect x="18" y="20" width="60" height="48" rx="14" fill="url(#lg)" />

  <!-- face panel -->
  <rect x="27" y="30" width="42" height="28" rx="9" fill="#2e1a52" fill-opacity="0.88" />

  <!-- eyes -->
  <circle cx="39" cy="42" r="4.4" fill="#f2ecfb" />
  <circle cx="57" cy="42" r="4.4" fill="#f2ecfb" />

  <!-- friendly smile -->
  <path d="M39 50C43 54 53 54 57 50" fill="none" stroke="#f2ecfb" stroke-width="2.4" stroke-linecap="round" />

  <!-- ears / side bolts -->
  <rect x="12" y="38" width="6" height="14" rx="3" fill="url(#lgDeep)" />
  <rect x="78" y="38" width="6" height="14" rx="3" fill="url(#lgDeep)" />

  <!-- review badge: magnifying glass inspecting code -->
  <g transform="translate(48,76)">
    <rect x="-26" y="-8" width="52" height="18" rx="9" fill="url(#lgDeep)" />
    <!-- magnifying glass -->
    <circle cx="-15" cy="0" r="5.2" fill="none" stroke="#c4a6ec" stroke-width="2.2" />
    <line x1="-11.3" y1="3.7" x2="-7.5" y2="7.5" stroke="#c4a6ec" stroke-width="2.4" stroke-linecap="round" />
    <!-- code brackets -->
    <text x="7" y="5" text-anchor="middle" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="11" font-weight="700" fill="#f2ecfb">&lt;/&gt;</text>
  </g>
</svg>
