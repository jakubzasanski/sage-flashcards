name: E2E (reusable)

# Single source of truth for the e2e recipe, shared by the PR gate (ci.yml) and the
# nightly safety net (nightly-e2e.yml) via `workflow_call`. The Supabase + Playwright
# setup — and the local-env / pinned-CLI fixes below — therefore live in exactly one place.
on:
  workflow_call: {}

# Least privilege: only reads the repo. In a reusable workflow this also caps what
# a caller can grant, so the e2e recipe can never escalate beyond read.
permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    # The app under test (served by `astro preview`) reads SUPABASE_URL/SUPABASE_KEY from
    # astro:env/server; with them unset, src/lib/supabase.ts createClient() returns null and
    # auth is dead, so the whole suite fails. These are the well-known LOCAL demo values that
    # `supabase start` reproduces deterministically (mirrors test/support/config.ts) — public,
    # never production secrets — so they belong in the file, NOT in GitHub secrets (real prod
    # secrets here would point the previewed app at production).
    env:
      SUPABASE_URL: http://127.0.0.1:54321
      SUPABASE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx astro sync
      - uses: supabase/setup-cli@v2
        with:
          # Pinned (not `latest`) for a deterministic merge gate. Must match the
          # `supabase` version resolved in package-lock.json (the CLI the project runs
          # locally) — config.toml uses keys an older CLI rejects ('failed to parse config').
          version: 2.107.0
      - name: Cache Playwright browsers
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
      - run: npx playwright install --with-deps chromium
      - name: Provision .dev.vars for the Cloudflare preview runtime
        # `astro preview` serves the build on workerd, which reads runtime vars from
        # .dev.vars — NOT the job env / process.env. Without this the previewed app's
        # createClient() is null and UI login never reaches /dashboard. Same local demo
        # values as the env above (single source); .dev.vars is gitignored.
        run: |
          {
            echo "SUPABASE_URL=$SUPABASE_URL"
            echo "SUPABASE_KEY=$SUPABASE_KEY"
          } > .dev.vars
      - run: supabase start
      - run: npm run test:e2e
      # Upload only on failure: a green run's report/traces are noise and cost. Trade-off:
      # a flaky test that passes on retry won't leave its trace — re-run to reproduce.
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
          if-no-files-found: ignore
      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: test-results/
          retention-days: 14
          if-no-files-found: ignore
      - if: always()
        run: supabase stop
