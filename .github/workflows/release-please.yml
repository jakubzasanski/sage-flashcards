name: release-please

# On every push to master, release-please opens/updates a "release PR" that
# aggregates Conventional Commits since the last release tag (v1.1.0), bumping the
# version + regenerating CHANGELOG.md. Merging that release PR tags the version and
# cuts a GitHub Release. Config lives in release-please-config.json +
# .release-please-manifest.json (seeded at the current 1.1.0).

on:
  push:
    branches: [master]

# Avoid overlapping runs racing to update the same release PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# A GitHub App token (not the default GITHUB_TOKEN) is required: PRs/branches
# created with GITHUB_TOKEN do NOT trigger other workflows, so the release PR would
# never run the required checks (lint-unit-build / integration / e2e / pr-title) and
# could not be merged under the master ruleset. An App-installation token DOES emit
# those events. The App needs repo Contents + Pull requests: read & write; its
# credentials live in the RELEASE_PLEASE_APP_ID / RELEASE_PLEASE_APP_PRIVATE_KEY
# secrets. The job's own GITHUB_TOKEN scopes are dropped to read-only since the App
# token does the writes.
permissions:
  contents: read

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
