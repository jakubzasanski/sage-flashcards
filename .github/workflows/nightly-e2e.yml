name: Nightly E2E

# Early-warning net for e2e flake/regressions, separate from the PR gate. Reuses the
# exact e2e recipe from e2e.yml so there is no second copy to maintain. Scheduled events
# run against master (the default branch).
on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch: {}

jobs:
  e2e:
    uses: ./.github/workflows/e2e.yml
